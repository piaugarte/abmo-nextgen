
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin &mdash; Family Spotlight</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
  :root {
    --paper: #f4ede2; --paper-deep: #ebe1d1; --ink: #1f1b16;
    --ink-soft: #4a4238; --ink-mute: #7a6f61;
    --accent: #b8453a; --accent-deep: #8f2d24;
    --gold: #c89434; --green: #5a7a3e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: var(--paper); color: var(--ink); font-size: 14px; line-height: 1.5; min-height: 100vh; }
  .display { font-family: 'Fraunces', serif; }

  /* GATE */
  .gate { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .gate-card { max-width: 400px; width: 100%; padding: 48px 40px; background: var(--paper); border: 1px solid var(--ink); border-radius: 14px; }
  .gate-card h1 { font-family: 'Fraunces', serif; font-weight: 400; font-size: 32px; letter-spacing: -0.02em; margin-bottom: 8px; }
  .gate-card p { color: var(--ink-mute); margin-bottom: 28px; }
  .gate-card input { width: 100%; padding: 14px 16px; border: 1px solid rgba(31,27,22,0.2); background: #fff; font-family: inherit; font-size: 15px; margin-bottom: 16px; border-radius: 10px; }
  .gate-card input:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
  .gate-card button { width: 100%; padding: 14px; background: var(--ink); color: var(--paper); border: none; cursor: pointer; font-family: inherit; font-size: 13px; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 500; border-radius: 999px; }
  .gate-card button:hover { background: var(--accent); }
  .gate-card .err { color: var(--accent); font-size: 13px; margin-top: 12px; }

  /* APP LAYOUT */
  .app { display: none; min-height: 100vh; }
  .app.active { display: grid; grid-template-columns: 340px 1fr; }

  aside { background: var(--paper-deep); border-right: 1px solid rgba(31,27,22,0.15); padding: 24px; max-height: 100vh; overflow-y: auto; position: sticky; top: 0; }
  aside .title { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 500; letter-spacing: -0.01em; margin-bottom: 4px; }
  aside .sub { font-size: 11px; color: var(--ink-mute); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 24px; }

  .filter-tabs { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 16px; }
  .filter-tabs button { flex: 1 1 auto; padding: 6px 10px; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; background: transparent; border: 1px solid rgba(31,27,22,0.2); cursor: pointer; font-family: inherit; color: var(--ink-soft); border-radius: 999px; white-space: nowrap; display: inline-flex; align-items: center; gap: 6px; }
  .filter-tabs button.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .filter-tabs .count { font-size: 9px; background: rgba(31,27,22,0.08); color: var(--ink-mute); padding: 1px 6px; border-radius: 999px; letter-spacing: 0; font-weight: 500; min-width: 16px; text-align: center; }
  .filter-tabs .count:empty { display: none; }
  .filter-tabs button.active .count { background: rgba(244,237,226,0.2); color: var(--paper); }

  .submission-list { display: flex; flex-direction: column; gap: 8px; }
  .sub-card { padding: 14px 16px; background: var(--paper); border: 1px solid rgba(31,27,22,0.15); cursor: pointer; transition: all 0.15s; border-radius: 10px; }
  .sub-card:hover { border-color: var(--ink); }
  .sub-card.active { border-color: var(--accent); border-left-width: 3px; padding-left: 14px; background: rgba(184,69,58,0.04); }
  .sub-card .name { font-family: 'Fraunces', serif; font-size: 17px; font-weight: 500; margin-bottom: 2px; }
  .sub-card .owner { font-size: 12px; color: var(--ink-mute); margin-bottom: 8px; }
  .sub-card .meta-row { display: flex; justify-content: space-between; align-items: center; font-size: 11px; }
  .badge { padding: 2px 10px; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 500; border-radius: 999px; white-space: nowrap; }
  .badge.new { background: rgba(200,148,52,0.2); color: var(--gold); }
  .badge.cleaned { background: rgba(122,111,97,0.2); color: var(--ink-soft); }
  .badge.for_approval { background: rgba(184,69,58,0.15); color: var(--accent); }
  .badge.approved { background: rgba(90,122,62,0.15); color: var(--green); }
  .badge.live { background: var(--green); color: var(--paper); }
  .sub-card .time { color: var(--ink-mute); }

  main.content { padding: 32px 40px; max-height: 100vh; overflow-y: auto; }
  .empty-state { display: flex; align-items: center; justify-content: center; height: 100%; text-align: center; color: var(--ink-mute); }
  .empty-state .inner { max-width: 320px; font-family: 'Fraunces', serif; font-size: 20px; font-style: italic; }

  /* DETAIL */
  .detail .header { padding-bottom: 24px; border-bottom: 1px solid rgba(31,27,22,0.15); margin-bottom: 32px; display: flex; justify-content: space-between; align-items: flex-start; gap: 20px; flex-wrap: wrap; }
  .detail h1 { font-family: 'Fraunces', serif; font-size: 36px; font-weight: 400; letter-spacing: -0.02em; line-height: 1.1; margin-bottom: 6px; }
  .detail .owner { color: var(--ink-mute); font-size: 14px; }

  .tabs { display: flex; gap: 2px; margin-bottom: 24px; border-bottom: 1px solid rgba(31,27,22,0.15); }
  .tabs button { padding: 10px 16px; font: inherit; font-size: 13px; background: transparent; border: none; cursor: pointer; border-bottom: 2px solid transparent; color: var(--ink-mute); letter-spacing: 0.05em; }
  .tabs button.active { color: var(--ink); border-bottom-color: var(--accent); font-weight: 500; }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ANSWERS (raw) view */
  .qa-block { margin-bottom: 28px; }
  .qa-block .q { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--ink-mute); margin-bottom: 8px; }
  .qa-block .a { font-family: 'Fraunces', serif; font-size: 17px; line-height: 1.6; white-space: pre-wrap; padding: 12px 16px; background: var(--paper-deep); border-left: 2px solid var(--accent); border-radius: 0 8px 8px 0; }

  .photos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-top: 12px; }
  .photos-grid img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; }

  /* SECTION HEADER in profile copy */
  .section-header {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: 24px;
    letter-spacing: -0.01em;
    margin: 40px 0 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(31,27,22,0.2);
    color: var(--ink);
  }
  .section-header:first-child { margin-top: 0; }

  /* BUTTONS */
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 18px; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; border: 1px solid var(--ink); background: transparent; cursor: pointer; font-family: inherit; font-weight: 500; border-radius: 999px; }
  .btn:hover { background: var(--ink); color: var(--paper); }
  .btn-primary { background: var(--ink); color: var(--paper); }
  .btn-primary:hover { background: var(--accent); border-color: var(--accent); }
  .btn-accent { background: var(--accent); color: var(--paper); border-color: var(--accent); }
  .btn-accent:hover { background: var(--accent-deep); border-color: var(--accent-deep); }
  .btn-danger { border-color: rgba(143,45,36,0.4); color: var(--accent-deep); }
  .btn-danger:hover { background: var(--accent-deep); color: var(--paper); border-color: var(--accent-deep); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .actions-bar { display: flex; gap: 10px; flex-wrap: wrap; }

  /* PROFILE COPY (editable) */
  .copy-field { margin-bottom: 20px; position: relative; }
  .copy-field .row {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;
  }
  .copy-field label {
    font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--ink-soft); font-weight: 500;
  }
  .copy-field .copy-btn {
    background: transparent; border: none; cursor: pointer;
    color: var(--ink-mute); font-size: 11px; letter-spacing: 0.1em;
    text-transform: uppercase; font-family: inherit; padding: 4px 8px;
    border-radius: 6px; display: inline-flex; align-items: center; gap: 5px;
    transition: all 0.15s;
  }
  .copy-field .copy-btn:hover { background: rgba(31,27,22,0.06); color: var(--ink); }
  .copy-field .copy-btn.copied { color: var(--green); }
  .copy-field .copy-btn svg { width: 13px; height: 13px; }
  .copy-field input, .copy-field textarea {
    width: 100%; padding: 12px 14px; border: 1px solid rgba(31,27,22,0.2);
    background: #fff; font-family: 'Fraunces', serif; font-size: 16px; line-height: 1.6;
    color: var(--ink); resize: vertical; border-radius: 8px;
  }
  .copy-field textarea { min-height: 80px; }
  .copy-field input:focus, .copy-field textarea:focus {
    outline: 2px solid var(--accent); outline-offset: -1px; border-color: transparent;
  }

  .empty-profile {
    color: var(--ink-mute); font-family: 'Fraunces', serif;
    font-size: 17px; font-style: italic; padding: 40px 0;
    line-height: 1.6;
  }

  /* TOAST & MISC */
  .toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 24px; background: var(--ink); color: var(--paper); font-size: 13px; z-index: 100; transform: translateY(200%); transition: transform 0.3s; border-radius: 999px; }
  .toast.show { transform: translateY(0); }

  .spinner { display: inline-block; width: 12px; height: 12px; border: 1.5px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="gate" id="gate">
  <div class="gate-card">
    <h1>Admin &mdash; Family Spotlight</h1>
    <p>Enter the team password to continue.</p>
    <input type="password" id="pwd" placeholder="Password" />
    <button id="enterBtn">Enter</button>
    <div class="err" id="gateErr" style="display:none"></div>
  </div>
</div>

<div class="app" id="app">
  <aside>
    <div class="title">Submissions</div>
    <div class="sub">Family Entrepreneur Spotlight</div>

    <div class="filter-tabs">
      <button class="active" data-filter="all">All <span class="count" data-count="all"></span></button>
      <button data-filter="new">New <span class="count" data-count="new"></span></button>
      <button data-filter="cleaned">Cleaned <span class="count" data-count="cleaned"></span></button>
      <button data-filter="for_approval">For approval <span class="count" data-count="for_approval"></span></button>
      <button data-filter="approved">Approved <span class="count" data-count="approved"></span></button>
      <button data-filter="live">Live <span class="count" data-count="live"></span></button>
    </div>

    <div class="submission-list" id="submissionList">
      <div style="padding: 20px 0; color: var(--ink-mute); font-size: 13px; text-align: center;">Loading...</div>
    </div>
  </aside>

  <main class="content">
    <div class="empty-state" id="emptyState">
      <div class="inner">&ldquo;Select a submission from the left to review and edit.&rdquo;</div>
    </div>

    <div class="detail" id="detail" style="display:none;">
      <div class="header">
        <div>
          <h1 id="dBusiness">Business Name</h1>
          <div class="owner" id="dOwner">owner &mdash; email</div>
        </div>
        <div class="actions-bar" id="dActions"></div>
      </div>

      <div class="tabs">
        <button class="active" data-tab="answers">Raw Answers</button>
        <button data-tab="profile">Profile Copy</button>
      </div>

      <div class="tab-content active" id="tab-answers"></div>
      <div class="tab-content" id="tab-profile"></div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
const cfg = window.APP_CONFIG;
const sb = supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY);

let adminState = { submissions: [], selected: null, filter: 'all', profiles: {} };

// ============================================================
// QUESTIONNAIRE STRUCTURE
// This must match index.html. Used to label and group answers.
// ============================================================
const SECTIONS = [
  {
    title: "Introduction",
    questions: [
      { key: "business_name",  label: "What is your business called?", type: "short" },
      { key: "one_liner",      label: "Describe your business in a sentence.", type: "short" },
    ],
  },
  {
    title: "Spotlight interview",
    questions: [
      { key: "intro",          label: "Introduce yourself." },
      { key: "inspiration",    label: "What inspired this venture?" },
      { key: "hopes",          label: "What do you hope younger family members learn from your story?" },
      { key: "support",        label: "How can our family best support your business?" },
    ],
  },
  {
    title: "A day in the life",
    questions: [
      { key: "routine",        label: "Walk us through a slice of your routine." },
      { key: "challenge",      label: "Share a challenge you've overcome." },
      { key: "win",            label: "Share a small win." },
    ],
  },
  {
    title: "Lessons & advice",
    questions: [
      { key: "lesson",         label: "What do you wish you'd known earlier?" },
      { key: "principle",      label: "What principle has shaped your success?" },
      { key: "advice",         label: "Advice for the next generation." },
    ],
  },
  {
    title: "Mentorship & contact",
    questions: [
      { key: "open_to",        label: "Are you open to mentoring a younger family member?" },
    ],
  },
];

// Flat map for looking up question labels by key
const Q_LABEL_BY_KEY = {};
SECTIONS.forEach(sec => sec.questions.forEach(q => { Q_LABEL_BY_KEY[q.key] = q.label; }));

// Retired questions that may exist on old submissions
// (shown in raw answers tab under "Older questions" for back-compat)
const RETIRED_QUESTIONS = {
  purpose: "What is this business really about?",
};

// Which keys are "long form" — the ones we send to AI for cleanup
const CLEANABLE_KEYS = ['one_liner', 'intro', 'inspiration', 'hopes', 'support', 'routine', 'challenge', 'win', 'lesson', 'principle', 'advice', 'open_to'];

// ============================================================
// GATE
// ============================================================
document.getElementById('enterBtn').onclick = tryEnter;
document.getElementById('pwd').addEventListener('keypress', e => { if (e.key === 'Enter') tryEnter(); });

async function tryEnter() {
  const pwd = document.getElementById('pwd').value;
  const err = document.getElementById('gateErr');
  const STORED_HASH = window.APP_CONFIG.ADMIN_PASSWORD_SHA256 || "";
  if (!STORED_HASH) {
    if (pwd.length > 0) { sessionStorage.setItem('admin_ok', '1'); boot(); return; }
  } else {
    const hash = await sha256(pwd);
    if (hash === STORED_HASH) { sessionStorage.setItem('admin_ok', '1'); boot(); return; }
  }
  err.textContent = "Incorrect password."; err.style.display = 'block';
}

async function sha256(s) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

function boot() {
  document.getElementById('gate').style.display = 'none';
  document.getElementById('app').classList.add('active');
  loadSubmissions();
}

if (sessionStorage.getItem('admin_ok') === '1') boot();

// ============================================================
// LOAD
// ============================================================
async function loadSubmissions() {
  const { data, error } = await sb.from('submissions').select('*').order('updated_at', { ascending: false });
  if (error) {
    document.getElementById('submissionList').innerHTML =
      `<div style="color:var(--accent);font-size:13px;padding:16px 0;">Error: ${error.message}</div>`;
    return;
  }
  adminState.submissions = data || [];

  const { data: profs } = await sb.from('profiles').select('*');
  (profs || []).forEach(p => { adminState.profiles[p.submission_id] = hydrateProfile(p); });

  renderList();
}

// Make sure a profile has a `cleaned` object (migrates old shapes away quietly)
function hydrateProfile(rawProf) {
  if (!rawProf) return rawProf;

  // Try to get cleaned answers from anywhere in the existing data
  let cleaned = {};

  // Preferred: profile.sections[0].cleaned (new shape)
  if (Array.isArray(rawProf.sections)) {
    const entry = rawProf.sections.find(x => x && x._cleaned_v1);
    if (entry && entry.cleaned) cleaned = entry.cleaned;
  }

  rawProf.cleaned = cleaned;
  return rawProf;
}

// Derive the display state of a submission from its data:
//   'new'           = no profile yet (never cleaned up)
//   'cleaned'       = profile exists, stage = 'cleaned' (default after AI cleanup)
//   'for_approval'  = profile exists, stage = 'for_approval'
//   'approved'      = profile exists, stage = 'approved'
//   'live'          = profile exists, stage = 'live' (also back-compat: published=true)
function submissionState(s) {
  const prof = adminState.profiles[s.id];
  if (!prof) return 'new';
  if (prof.stage) return prof.stage;
  // Back-compat for rows without stage set: infer from published flag
  if (prof.published) return 'live';
  return 'cleaned';
}

// Human-readable label for a state
function stateLabel(state) {
  return ({
    new: 'New',
    cleaned: 'Cleaned',
    for_approval: 'For approval',
    approved: 'Approved',
    live: 'Live',
  })[state] || state;
}

function renderFilterCounts() {
  // Tally how many submissions fall into each state
  const counts = { all: adminState.submissions.length, new: 0, cleaned: 0, for_approval: 0, approved: 0, live: 0 };
  adminState.submissions.forEach(s => {
    const st = submissionState(s);
    if (counts[st] !== undefined) counts[st]++;
  });
  // Write each count into its pill; blank out zeros so they hide via :empty CSS
  Object.keys(counts).forEach(key => {
    const el = document.querySelector(`.filter-tabs .count[data-count="${key}"]`);
    if (el) el.textContent = counts[key] > 0 ? counts[key] : '';
  });
}

function renderList() {
  renderFilterCounts();
  const list = document.getElementById('submissionList');
  const filtered = adminState.submissions.filter(s => {
    if (adminState.filter === 'all') return true;
    return submissionState(s) === adminState.filter;
  });
  if (filtered.length === 0) {
    list.innerHTML = '<div style="padding:16px 0;color:var(--ink-mute);font-size:13px;text-align:center;">No submissions in this view.</div>';
    return;
  }
  list.innerHTML = filtered.map(s => {
    const state = submissionState(s);
    return `
    <div class="sub-card ${adminState.selected?.id === s.id ? 'active' : ''}" onclick="selectSubmission('${s.id}')">
      <div class="name">${escapeHtml(s.business_name || 'Untitled business')}</div>
      <div class="owner">${escapeHtml(s.owner_name || '—')} &middot; ${escapeHtml(s.email)}</div>
      <div class="meta-row">
        <span class="badge ${state}">${stateLabel(state)}</span>
        <span class="time">${timeAgo(s.updated_at)}</span>
      </div>
    </div>`;
  }).join('');
}

document.querySelectorAll('.filter-tabs button').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('.filter-tabs button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    adminState.filter = b.dataset.filter;
    renderList();
  };
});

window.selectSubmission = (id) => {
  adminState.selected = adminState.submissions.find(s => s.id === id);
  renderList();
  renderDetail();
};

// ============================================================
// STAGE FLOW
// Forward progression: cleaned → for_approval → approved → live
// Each stage has a label for the "next stage" button and the "back" button.
// ============================================================
const STAGE_FLOW = {
  cleaned:      { nextStage: 'for_approval', nextLabel: 'Mark for approval',     prevStage: null,           prevLabel: null },
  for_approval: { nextStage: 'approved',     nextLabel: 'Mark as approved',     prevStage: 'cleaned',      prevLabel: 'Back to Cleaned' },
  approved:     { nextStage: 'live',         nextLabel: 'Mark as live',         prevStage: 'for_approval', prevLabel: 'Back to For Approval' },
  live:         { nextStage: null,           nextLabel: null,                   prevStage: 'approved',     prevLabel: 'Unmark live' },
};

function renderDetail() {
  const s = adminState.selected;
  if (!s) return;
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('detail').style.display = 'block';
  document.getElementById('dBusiness').textContent = s.business_name || 'Untitled business';
  document.getElementById('dOwner').textContent = `${s.owner_name || '—'} · ${s.email}`;

  const prof = adminState.profiles[s.id];
  const hasProfile = !!prof;
  const currentState = submissionState(s);
  const flow = hasProfile ? STAGE_FLOW[currentState] : null;

  // Build the actions bar: status badge + cleanup button + stage buttons
  let actionsHtml = `
    <span class="badge ${currentState}" style="align-self: center; margin-right: 4px;">${stateLabel(currentState)}</span>
    <button class="btn" onclick="cleanUpAnswers()" id="cleanBtn">
      ${hasProfile ? 'Re-run cleanup' : 'Clean up answers'}
    </button>
  `;

  if (flow) {
    if (flow.prevStage || currentState === 'live') {
      actionsHtml += `<button class="btn" onclick="setStage('${flow.prevStage}')">${flow.prevLabel}</button>`;
    }
    if (flow.nextStage) {
      actionsHtml += `<button class="btn btn-accent" onclick="setStage('${flow.nextStage}')">${flow.nextLabel} &rarr;</button>`;
    }
  }

  // Delete — always available, styled quietly so it doesn't compete
  actionsHtml += `<button class="btn btn-danger" onclick="deleteSubmission()" title="Delete this entry and all its data">Delete</button>`;

  document.getElementById('dActions').innerHTML = actionsHtml;
  renderAnswersTab();
  renderProfileTab();
}

document.querySelectorAll('.tabs button').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.tabs button').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  };
});

// ============================================================
// RAW ANSWERS TAB
// ============================================================
function renderAnswersTab() {
  const s = adminState.selected;
  const a = s.answers || {};
  const photos = s.photos || [];

  let html = '';

  // Owner name + business name at the top
  if (s.owner_name) {
    html += `<div class="qa-block"><div class="q">Owner name</div><div class="a">${escapeHtml(s.owner_name)}</div></div>`;
  }
  if (s.business_name) {
    html += `<div class="qa-block"><div class="q">Business name</div><div class="a">${escapeHtml(s.business_name)}</div></div>`;
  }

  // All questionnaire answers grouped by section
  SECTIONS.forEach(sec => {
    let sectionHtml = '';
    sec.questions.forEach(q => {
      if (q.key === 'business_name') return; // already shown
      const val = a[q.key];
      if (val && String(val).trim().length > 0) {
        sectionHtml += `<div class="qa-block"><div class="q">${escapeHtml(q.label)}</div><div class="a">${escapeHtml(val)}</div></div>`;
      }
    });
    if (sectionHtml) {
      html += `<h2 class="section-header">${escapeHtml(sec.title)}</h2>${sectionHtml}`;
    }
  });

  // Retired questions — only shown if the submitter actually answered them
  // (e.g., older submissions made before a question was removed)
  let retiredHtml = '';
  Object.keys(RETIRED_QUESTIONS).forEach(key => {
    const val = a[key];
    if (val && String(val).trim().length > 0) {
      retiredHtml += `<div class="qa-block"><div class="q">${escapeHtml(RETIRED_QUESTIONS[key])}</div><div class="a">${escapeHtml(val)}</div></div>`;
    }
  });
  if (retiredHtml) {
    html += `<h2 class="section-header" style="color:var(--ink-mute);">Older questions</h2>${retiredHtml}`;
  }

  // Contact
  if (a.contact && (a.contact.email || a.contact.website || a.contact.instagram || a.contact.other)) {
    html += `<h2 class="section-header">Contact</h2><div class="qa-block"><div class="a">${[
      a.contact.email && 'Email: ' + a.contact.email,
      a.contact.website && 'Web: ' + a.contact.website,
      a.contact.instagram && 'IG: ' + a.contact.instagram,
      a.contact.other && a.contact.other,
    ].filter(Boolean).join('\n')}</div></div>`;
  }

  // Photos
  if (photos.length > 0) {
    html += `<h2 class="section-header">Photos</h2><div class="photos-grid">
      ${photos.map(p => `<img src="${p.url}" alt="">`).join('')}
    </div>`;
  }

  document.getElementById('tab-answers').innerHTML = html || '<p style="color:var(--ink-mute);">No answers yet.</p>';
}

// ============================================================
// PROFILE COPY TAB (editable, grouped by section)
// ============================================================
function renderProfileTab() {
  const s = adminState.selected;
  const prof = adminState.profiles[s.id];
  const container = document.getElementById('tab-profile');

  if (!prof) {
    container.innerHTML = `
      <p class="empty-profile">
        No cleaned-up copy yet. Click <strong>Clean up answers</strong> above and AI will lightly edit each answer &mdash; fixing grammar, typos, and awkward phrasing, while keeping the writer's voice.
      </p>`;
    return;
  }

  const cleaned = prof.cleaned || {};
  const copyIconSVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
  let html = '';

  SECTIONS.forEach(sec => {
    let sectionHtml = '';
    sec.questions.forEach(q => {
      // Only show the question in profile copy if it was cleanable AND has content
      if (!CLEANABLE_KEYS.includes(q.key)) {
        // Non-cleanable short fields (business_name) — pull from submission
        const raw = s.answers?.[q.key] || s[q.key] || '';
        if (!raw) return;
        sectionHtml += `
          <div class="copy-field">
            <div class="row">
              <label>${escapeHtml(q.label)}</label>
              <button type="button" class="copy-btn" onclick="copyFieldValue('${q.key}', this)" title="Copy answer">${copyIconSVG}<span>Copy</span></button>
            </div>
            <input type="text" data-field-key="${q.key}" value="${escapeHtml(raw)}" />
          </div>`;
      } else {
        const val = cleaned[q.key] ?? s.answers?.[q.key] ?? '';
        if (!val && !cleaned[q.key]) return; // skip empty ones entirely
        const rows = q.type === 'short' ? 2 : 6;
        sectionHtml += `
          <div class="copy-field">
            <div class="row">
              <label>${escapeHtml(q.label)}</label>
              <button type="button" class="copy-btn" onclick="copyFieldValue('${q.key}', this)" title="Copy answer">${copyIconSVG}<span>Copy</span></button>
            </div>
            <textarea data-field-key="${q.key}" rows="${rows}">${escapeHtml(val)}</textarea>
          </div>`;
      }
    });
    if (sectionHtml) {
      html += `<h2 class="section-header">${escapeHtml(sec.title)}</h2>${sectionHtml}`;
    }
  });

  html += `
    <div style="margin-top: 40px; padding-top: 24px; border-top: 1px solid rgba(31,27,22,0.15); display:flex; gap:10px; flex-wrap: wrap;">
      <button class="btn btn-primary" onclick="saveProfile()">Save changes</button>
    </div>`;

  container.innerHTML = html;
}

// Copy a single field's current value to clipboard
window.copyFieldValue = (key, btn) => {
  const el = document.querySelector(`[data-field-key="${key}"]`);
  if (!el) return;
  const text = el.value || '';
  navigator.clipboard.writeText(text).then(() => {
    const label = btn.querySelector('span');
    const originalText = label ? label.textContent : 'Copy';
    if (label) label.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      if (label) label.textContent = originalText;
      btn.classList.remove('copied');
    }, 1600);
  }).catch(err => {
    toast('Copy failed: ' + err.message);
  });
};

window.saveProfile = async () => {
  const s = adminState.selected;
  const prof = adminState.profiles[s.id];

  // Collect every edited field
  const editedCleaned = {};
  const editedShort = {};
  document.querySelectorAll('[data-field-key]').forEach(el => {
    const k = el.dataset.fieldKey;
    if (CLEANABLE_KEYS.includes(k)) {
      editedCleaned[k] = el.value;
    } else {
      editedShort[k] = el.value;
    }
  });

  prof.cleaned = editedCleaned;

  const sectionsPayload = [{ _cleaned_v1: true, cleaned: editedCleaned }];

  // Update the short fields on the profile row too (business_name, etc.)
  const updatePayload = {
    business_name: editedShort.business_name ?? prof.business_name ?? s.business_name,
    owner_name: prof.owner_name || s.owner_name,
    sections: sectionsPayload,
  };

  const { error } = await sb.from('profiles').update(updatePayload).eq('id', prof.id);
  if (error) { toast('Save failed: ' + error.message); return; }
  toast('Saved');
};

// ============================================================
// CLEAN UP ANSWERS (AI)
// ============================================================
window.cleanUpAnswers = async () => {
  const s = adminState.selected;
  const btn = document.getElementById('cleanBtn');
  btn.innerHTML = '<span class="spinner"></span> Cleaning up...';
  btn.disabled = true;

  try {
    const resp = await fetch('/api/generate-profile', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ answers: s.answers || {} }),
    });
    if (!resp.ok) {
      const errTxt = await resp.text();
      throw new Error(errTxt);
    }
    const data = await resp.json();
    const cleaned = data.cleaned || {};

    const sectionsPayload = [{ _cleaned_v1: true, cleaned }];

    const existing = adminState.profiles[s.id];
    const payload = {
      submission_id: s.id,
      business_name: s.business_name || '',
      owner_name: s.owner_name || '',
      tagline: '',
      hero_image: (s.photos && s.photos[0] && s.photos[0].url) || '',
      sections: sectionsPayload,
      gallery: (s.photos || []).map(p => ({ url: p.url, caption: p.caption || '' })),
      contact: (s.answers && s.answers.contact) || {},
    };
    // Only set stage when creating a fresh profile. Re-running cleanup
    // on an existing profile keeps whatever stage it was already at.
    if (!existing) payload.stage = 'cleaned';

    let result;
    if (existing) {
      result = await sb.from('profiles').update(payload).eq('id', existing.id).select().single();
    } else {
      result = await sb.from('profiles').insert(payload).select().single();
    }
    if (result.error) throw result.error;

    adminState.profiles[s.id] = hydrateProfile(result.data);
    toast('Answers cleaned up');
    renderDetail();
    // Auto-jump to the profile tab so they can see the result
    document.querySelector('[data-tab=profile]').click();
  } catch (e) {
    console.error(e);
    toast('Cleanup failed: ' + e.message);
    btn.innerHTML = 'Clean up answers';
    btn.disabled = false;
  }
};

// ============================================================
// SET STAGE
// Advances (or rewinds) the profile stage. Content stays editable at every stage.
// Also syncs `published` for back-compat (true when stage === 'live').
// ============================================================
window.setStage = async (newStage) => {
  const s = adminState.selected;
  const prof = adminState.profiles[s.id];
  if (!prof || !newStage) return;

  const payload = {
    stage: newStage,
    published: newStage === 'live',
  };

  const { error } = await sb.from('profiles').update(payload).eq('id', prof.id);
  if (error) { toast('Update failed: ' + error.message); return; }

  prof.stage = newStage;
  prof.published = payload.published;

  // Keep submissions.status loosely in sync
  const submissionStatus = newStage === 'live' ? 'published' : 'draft';
  await sb.from('submissions').update({ status: submissionStatus }).eq('id', s.id);
  s.status = submissionStatus;

  renderList();
  renderDetail();
  toast('Moved to ' + stateLabel(newStage));
};

// ============================================================
// DELETE SUBMISSION
// Deletes the submission AND any associated profile row.
// One confirmation step — names what's being deleted to prevent mistakes.
// Storage photos are not deleted automatically (orphaned files don't hurt;
// cleaning storage can be done manually in Supabase if needed).
// ============================================================
window.deleteSubmission = async () => {
  const s = adminState.selected;
  if (!s) return;

  const label = s.business_name || s.owner_name || s.email;
  const ok = confirm(`Delete "${label}"?\n\nThis removes the submission and any cleaned-up profile permanently. Cannot be undone.`);
  if (!ok) return;

  // Delete profile row first (if exists), then the submission
  const prof = adminState.profiles[s.id];
  if (prof) {
    const r = await sb.from('profiles').delete().eq('id', prof.id);
    if (r.error) { toast('Delete failed (profile): ' + r.error.message); return; }
  }
  const r2 = await sb.from('submissions').delete().eq('id', s.id);
  if (r2.error) { toast('Delete failed (submission): ' + r2.error.message); return; }

  // Remove from local state
  adminState.submissions = adminState.submissions.filter(x => x.id !== s.id);
  delete adminState.profiles[s.id];
  adminState.selected = null;

  // Go back to empty state
  document.getElementById('detail').style.display = 'none';
  document.getElementById('emptyState').style.display = 'flex';

  renderList();
  toast('Deleted "' + label + '"');
};

// ============================================================
// UTILS
// ============================================================
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}
function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[ch]);
}
function timeAgo(iso) {
  const d = new Date(iso);
  const s = Math.floor((Date.now() - d.getTime()) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}
